<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Latihan Menulis - Harimau</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
    text-align: center;
    padding: 30px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #ffffffee;
    padding: 25px;
    border-radius: 15px;
}

.word {
    font-size: 50px;
    font-weight: bold;
}

/* 🧠 关键：统一对齐系统 */
.trace-area {
    position: relative;
    width: 420px;
    height: 100px;
    margin: 30px auto;
}

/* ⭐ 字体垂直居中 */
.trace-guide {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;   /* 垂直居中 */
    justify-content: center;

    font-size: 56px;
    font-weight: bold;
    letter-spacing: 6px;

    color: transparent;
    -webkit-text-stroke: 2px #999;
}

/* ⭐ canvas 完全覆盖 */
#traceCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 420px;
    height: 100px;
    z-index: 2;
    border: 1px dashed #ccc;
}

/* 图片 */
.image-box img {
    width: 200px;
    border-radius: 12px;
}

/* 按钮 */
button {
    padding: 12px 20px;
    margin: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.check-btn { background: #4CAF50; color: white; }
.clear-btn { background: #E74C3C; color: white; }

.result {
    font-size: 28px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">

<h1>Latihan Menulis 🐾</h1>

<div class="word">HARIMAU</div>

<div class="image-box">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/56/Tiger.50.jpg">
</div>

<div class="trace-area">
    <div class="trace-guide">HARIMAU</div>
    <canvas id="traceCanvas" width="420" height="100"></canvas>
</div>

<button class="check-btn" onclick="checkWriting()">✔ Semak</button>
<button class="clear-btn" onclick="clearCanvas()">✖ Kosongkan</button>

<div id="result" class="result"></div>

</div>

<script>
const canvas = document.getElementById("traceCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let totalLength = 0;
let lastX = 0;
let lastY = 0;

ctx.lineWidth = 4;
ctx.lineCap = "round";

/* 画字 */
canvas.addEventListener("mousedown", e => {
    drawing = true;
    lastX = e.offsetX;
    lastY = e.offsetY;
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
});

canvas.addEventListener("mousemove", e => {
    if (!drawing) return;

    let dx = e.offsetX - lastX;
    let dy = e.offsetY - lastY;
    totalLength += Math.sqrt(dx*dx + dy*dy);

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();

    lastX = e.offsetX;
    lastY = e.offsetY;
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

/* 清除 */
function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    totalLength = 0;
    document.getElementById("result").innerText = "";
}

/* 🎉 成功音 */
function playSuccessSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < 3; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 600 + i * 200;
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + i * 0.1);
        osc.stop(audioCtx.currentTime + i * 0.1 + 0.2);
    }
}

/* ❌ 失败音 */
function playFailSound() {
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.frequency.value = 200;
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.4);
}

/* 判断 */
function checkWriting() {
    const result = document.getElementById("result");

    if (totalLength > 900) {
        result.innerHTML = "Bagus! 🎉";
        result.style.color = "green";
        playSuccessSound();
    } else {
        result.innerHTML = "Cuba lagi 😢";
        result.style.color = "red";
        playFailSound();
    }
}
</script>

</body>
</html>
