<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Latihan Menulis - Harimau</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
    text-align: center;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #ffffffdd;
    padding: 25px;
    border-radius: 12px;
}

h1 { color: #2d6a4f; }

.word {
    font-size: 48px;
    font-weight: bold;
}

.trace-area {
    position: relative;
    margin: 30px auto;
    width: 420px;
    height: 80px;
}

.trace-guide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    font-size: 56px;
    font-weight: bold;
    color: transparent;
    -webkit-text-stroke: 2px #888;
    letter-spacing: 6px;
}

#traceCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    border: 1px dashed #ccc;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Latihan Menulis 🐾</h1>

    <div class="word">HARIMAU</div>

    <div class="trace-area">
        <div class="trace-guide">HARIMAU</div>
        <canvas id="traceCanvas" width="420" height="80"></canvas>
    </div>

    <button onclick="checkWriting()">✔ Semak</button>
    <button onclick="clearCanvas()">✖ Kosongkan</button>
</div>

<script>
const canvas = document.getElementById("traceCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let totalLength = 0; // ⭐ 新：记录写字长度
let lastX = 0;
let lastY = 0;

ctx.lineWidth = 4;
ctx.lineCap = "round";
ctx.strokeStyle = "#2C3E50";

function getPos(e) {
    return { x: e.offsetX, y: e.offsetY };
}

canvas.addEventListener("mousedown", e => {
    drawing = true;
    const pos = getPos(e);
    lastX = pos.x;
    lastY = pos.y;
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    const pos = getPos(e);

    // ⭐ 计算移动距离
    const dx = pos.x - lastX;
    const dy = pos.y - lastY;
    const distance = Math.sqrt(dx*dx + dy*dy);
    totalLength += distance;

    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();

    lastX = pos.x;
    lastY = pos.y;
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    totalLength = 0;
}

/* 🔊 内嵌音效（一定会响） */
function playCorrect() {
    const audio = new Audio("data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQgAAAAA");
    audio.play();
}

function playWrong() {
    const audio = new Audio("data:audio/wav;base64,UklGRlQAAABXQVZFZm10IBAAAAABAAEAESsAACJWAAACABAAZGF0YQgAAAAA");
    audio.play();
}

/* ⭐ 判断更严格 */
function checkWriting() {
    if (totalLength > 800) { // ⭐ 阈值提高
        alert("Bagus! 🎉");
        playCorrect();
    } else {
        alert("Cuba lagi 😢");
        playWrong();
    }
}
</script>

</body>
</html>
