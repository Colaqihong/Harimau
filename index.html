<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Latihan Menulis - Harimau</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
    text-align: center;
    margin: 0;
    padding: 30px;
}

.container {
    max-width: 700px;
    margin: auto;
    background: #ffffffdd;
    padding: 25px;
    border-radius: 12px;
}

h1 {
    color: #2d6a4f;
}

.word {
    font-size: 48px;
    font-weight: bold;
}

/* ⭐ 重点：叠在一起 */
.trace-area {
    position: relative;
    margin: 30px auto;
    width: 420px;
    height: 80px;
}

.trace-guide {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    font-size: 56px;
    font-weight: bold;
    color: transparent;
    -webkit-text-stroke: 2px #888;
    letter-spacing: 6px;
    user-select: none;
}

#traceCanvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 2;
    border: 1px dashed #ccc;
}

button {
    padding: 10px 20px;
    margin: 10px;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Latihan Menulis 🐾</h1>

    <div class="word">HARIMAU</div>

    <div class="trace-area">
        <div class="trace-guide">HARIMAU</div>
        <canvas id="traceCanvas" width="420" height="80"></canvas>
    </div>

    <button onclick="checkWriting()">✔ Semak</button>
    <button onclick="clearCanvas()">✖ Kosongkan</button>
</div>

<script>
const canvas = document.getElementById("traceCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let strokes = 0;

ctx.lineWidth = 4;
ctx.lineCap = "round";
ctx.strokeStyle = "#2C3E50";

function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    return { x: e.offsetX, y: e.offsetY };
}

canvas.addEventListener("mousedown", e => {
    drawing = true;
    strokes++;
    const pos = getPos(e);
    ctx.beginPath();
    ctx.moveTo(pos.x, pos.y);
});

canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    const pos = getPos(e);
    ctx.lineTo(pos.x, pos.y);
    ctx.stroke();
});

canvas.addEventListener("mouseup", () => drawing = false);
canvas.addEventListener("mouseleave", () => drawing = false);

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    strokes = 0;
}

/* 🔊 修复后的音效 */
function playCorrect() {
    const audio = new Audio("https://www.soundjay.com/human/cheering-01.mp3");
    audio.play();
}

function playWrong() {
    const audio = new Audio("https://www.soundjay.com/human/fail-trombone-01.mp3");
    audio.play();
}

function checkWriting() {
    if (strokes > 5) {
        alert("Bagus! 🎉");
        playCorrect();
    } else {
        alert("Cuba lagi 😢");
        playWrong();
    }
}
</script>

</body>
</html>
