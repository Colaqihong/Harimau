<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<title>Latihan Menulis - Harimau</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(to bottom, #a8e6cf, #dcedc1);
    text-align: center;
    padding: 30px;
}
.container {
    max-width: 700px;
    margin: auto;
    background: #ffffffdd;
    padding: 25px;
    border-radius: 12px;
}
.word { font-size: 48px; font-weight: bold; }
.trace-area { position: relative; margin: 30px auto; width: 420px; height: 80px; }
.trace-guide { font-size: 56px; color: transparent; -webkit-text-stroke: 2px #999; letter-spacing: 6px; }
#traceCanvas { position: absolute; border: 1px dashed #ccc; }
button { padding: 10px 20px; margin: 10px; }
</style>
</head>

<body>
<div class="container">
<h1>Latihan Menulis 🐾</h1>

<div class="word">HARIMAU</div>

<div class="trace-area">
<div class="trace-guide">HARIMAU</div>
<canvas id="traceCanvas" width="420" height="80"></canvas>
</div>

<button onclick="checkWriting()">✔ Semak</button>
<button onclick="clearCanvas()">✖ Kosongkan</button>

</div>

<audio id="correctSound" src="https://www.soundjay.com/human/cheering-01.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/human/fail-trombone-01.mp3"></audio>

<script>
const canvas = document.getElementById("traceCanvas");
const ctx = canvas.getContext("2d");

let drawing = false;
let strokes = 0;

ctx.lineWidth = 4;

canvas.addEventListener("mousedown", e => {
    drawing = true;
    strokes++;
    ctx.beginPath();
});

canvas.addEventListener("mousemove", e => {
    if (!drawing) return;
    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
});

canvas.addEventListener("mouseup", () => drawing = false);

function clearCanvas() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    strokes = 0;
}

function checkWriting() {
    if (strokes > 5) {
        alert("Bagus! 🎉");
        document.getElementById("correctSound").play();
    } else {
        alert("Cuba lagi 😢");
        document.getElementById("wrongSound").play();
    }
}
</script>
</body>
</html>
